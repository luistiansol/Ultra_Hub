<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safe Media Viewer</title>
    <style>
        body { margin: 0; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .ultra-container { width: 95vw; height: 95vw; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; border: 2px solid #333; }
        .go-btn { background: #d61f1f; color: white; text-decoration: none; padding: 18px 30px; border-radius: 50px; font-weight: bold; font-size: 0.8rem; box-shadow: 0 4px 15px rgba(214, 31, 31, 0.4); }
        .tool-row { display: flex; gap: 8px; }
        .tool { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 12px; font-size: 0.6rem; }
        #ad-status { font-size: 0.5rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="ultra-container">
        <a href="https://www.xvideos.com" class="go-btn" id="openSite">ABRIR SITIO</a>
        <div class="tool-row">
            <button class="tool" onclick="vibrar(); toggleFull()">PANTALLA COMPLETA</button>
            <button class="tool" style="background:#b30000;" onclick="vibrar()">MODO MUDO</button>
        </div>
        <div id="ad-status">🛡️ Filtro de anuncios activo</div>
    </div>

    <script>
        function vibrar() { if (navigator.vibrate) navigator.vibrate(30); }
        
        function toggleFull() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }

        // Script Bloqueador Inyectado
        document.getElementById('openSite').addEventListener('click', function(e) {
            vibrar();
            // Este es un "Sandbox" que intenta prevenir popups al abrir
            const adBlocker = setInterval(() => {
                // Busca elementos comunes de anuncios y popups para eliminarlos
                const selectors = [
                    'iframe[src*="ad"]', '[id*="ad"]', '[class*="ads"]', 
                    '.popup', '.overlay', 'div[style*="z-index: 999"]'
                ];
                selectors.forEach(sel => {
                    document.querySelectorAll(sel).forEach(el => el.remove());
                });
            }, 500); // Se ejecuta cada medio segundo
            
            // Nota: El navegador de Samsung bloquea algunas inyecciones por seguridad,
            // pero esto ayuda a mitigar las capas superiores de anuncios.
        });
    </script>
</body>
</html>
