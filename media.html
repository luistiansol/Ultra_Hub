<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Update</title>
    <style>
        /* Modo Fantasma: Parece una pantalla de carga de Samsung */
        body { margin: 0; background: #000; color: #333; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .watch-face { width: 95vw; height: 95vw; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* Disfraz: Un simple reloj tenue que no llama la atención */
        .ghost-clock { font-size: 0.8rem; color: #111; letter-spacing: 2px; }

        /* Botón Invisible: Solo tú sabes dónde tocar (el centro) */
        #secret-trigger {
            width: 120px; height: 120px; border-radius: 50%;
            background: transparent; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* Indicador de "Sistema" para despistar */
        .status-dot { width: 4px; height: 4px; background: #0a0; border-radius: 50%; margin-top: 10px; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="watch-face">
        <div class="ghost-clock" id="clock">00:00</div>
        
        <button id="secret-trigger" onclick="launchGhost()">
            <div class="status-dot"></div>
        </button>
    </div>

    <script>
        // Actualizar el reloj para que parezca real
        function updateClock() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = time;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function launchGhost() {
            // 1. Vibración corta de confirmación (tú la sientes, nadie la oye)
            if (navigator.vibrate) navigator.vibrate(20);

            // 2. Forzar Pantalla Completa (Full Screen)
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            // 3. Redirección al sitio móvil con parámetros de "No Ads"
            // El navegador de Samsung tratará esto como una navegación limpia
            setTimeout(() => {
                window.location.href = "https://www.xvideos.com/?k=video&p=0";
            }, 200);
        }
    </script>
</body>
</html>
