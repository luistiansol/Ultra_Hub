<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FB Ultra Pro</title>
    <style>
        :root {
            --fb-blue: #1877F2;
            --watch-bg: #000;
        }

        body {
            margin: 0;
            background-color: var(--watch-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
            /* Soporte para notch/curvatura si el navegador lo requiere */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Contenedor circular exacto */
        .ultra-circle {
            width: 95vw;
            height: 95vw;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid #222;
            position: relative;
            box-sizing: border-box;
        }

        /* Botones estilo "Tile" de Wear OS */
        .full-btn {
            width: 85%;
            margin: 8px 0;
            padding: 16px;
            border-radius: 50px;
            border: none;
            color: white;
            font-weight: 800;
            font-size: 0.9rem;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .full-btn:active {
            transform: scale(0.92);
        }

        /* Colores por botón */
        .bg-feed { background-color: var(--fb-blue); }
        .bg-reels { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .bg-login { background-color: #333; }

        /* Icono de mudo discreto */
        .mute-btn {
            position: absolute;
            bottom: 30px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div class="ultra-circle">
        <button class="full-btn bg-feed" onclick="launch('https://m.facebook.com/?sk=h_chr')">
            FEED PRO
        </button>

        <button class="full-btn bg-reels" onclick="launch('https://m.facebook.com/reels/')">
            REELS PRO
        </button>
        
        <button class="full-btn bg-login" onclick="launch('https://m.facebook.com/login/')">
            LOGIN
        </button>

        <button class="mute-btn" onclick="toggleMute()">🔇</button>
    </div>

    <script>
        // Función unificada de lanzamiento con Fullscreen y Vibración
        function launch(url) {
            // 1. Vibrar (Feedback háptico)
            if (navigator.vibrate) navigator.vibrate([40, 20, 40]);

            // 2. Activar Pantalla Completa forzada
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            // 3. Pequeña espera para que cargue el Fullscreen antes del redireccionamiento
            setTimeout(() => {
                window.location.href = url;
            }, 300);
        }

        function toggleMute() {
            if (navigator.vibrate) navigator.vibrate(30);
            alert("Baja el volumen físico de tu Watch Ultra.");
        }
    </script>
</body>
</html>
